version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: managed-agent-v1-api:local
    container_name: managed-agent-v1-api
    volumes:
      - ./:/app
    environment:
      APP_ENV: dev
      MANAGED_AGENT_STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/managed_agents_v1
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: managed-agent-v1-postgres
    environment:
      POSTGRES_DB: managed_agents_v1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
