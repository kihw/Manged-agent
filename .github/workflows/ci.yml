name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-contracts-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          pip install openapi-spec-validator check-jsonschema yamllint pyyaml jsonschema
          npm install -g markdownlint-cli @apidevtools/swagger-cli

      - name: Validate OpenAPI structure
        run: openapi-spec-validator openapi.yaml

      - name: Validate JSON schemas (metaschema)
        run: |
          check-jsonschema --check-metaschema agent.schema.json
          check-jsonschema --check-metaschema policy.schema.json
          check-jsonschema --check-metaschema task-step.schema.json
          check-jsonschema --check-metaschema tool-execution.schema.json
          check-jsonschema --check-metaschema approval-request.schema.json
          check-jsonschema --check-metaschema artifact.schema.json
          check-jsonschema --check-metaschema mcp-server.schema.json

      - name: Cross-validate OpenAPI examples against JSON schemas
        run: python scripts/validate_openapi_examples.py

      - name: Lint YAML
        run: yamllint .

      - name: Lint JSON syntax
        run: |
          python -m json.tool agent.schema.json >/dev/null
          python -m json.tool policy.schema.json >/dev/null
          python -m json.tool task-step.schema.json >/dev/null
          python -m json.tool tool-execution.schema.json >/dev/null
          python -m json.tool approval-request.schema.json >/dev/null
          python -m json.tool artifact.schema.json >/dev/null
          python -m json.tool mcp-server.schema.json >/dev/null

      - name: Lint docs (Markdown)
        run: markdownlint README.md "docs/**/*.md"

  validate-json-schema-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate JSON syntax for all schema files
        run: |
          find . -type f -name '*.schema.json' -print0 | while IFS= read -r -d '' file; do
            python -m json.tool "$file" >/dev/null
          done
