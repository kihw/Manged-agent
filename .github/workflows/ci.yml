name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-contracts-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          pip install openapi-spec-validator check-jsonschema yamllint pyyaml jsonschema
          npm install -g markdownlint-cli @apidevtools/swagger-cli

      - name: Validate OpenAPI structure
        run: openapi-spec-validator openapi.yaml

      - name: Validate OpenAPI with fully resolved local $ref
        run: swagger-cli validate openapi.yaml

      - name: Validate OpenAPI local schema references are complete
        run: python scripts/validate_openapi_schema_refs.py

      - name: Validate JSON schemas
        run: |
          check-jsonschema --schemafile agent.schema.json agent.schema.json
          check-jsonschema --schemafile task-step.schema.json task-step.schema.json
          check-jsonschema --schemafile tool-execution.schema.json tool-execution.schema.json
          check-jsonschema --schemafile approval-request.schema.json approval-request.schema.json
          check-jsonschema --schemafile artifact.schema.json artifact.schema.json
          check-jsonschema --schemafile mcp-server.schema.json mcp-server.schema.json
          check-jsonschema --schemafile policy.schema.json policy.schema.json

      - name: Cross-validate OpenAPI examples against JSON schemas
        run: python scripts/validate_openapi_examples.py

      - name: Lint YAML
        run: yamllint .

      - name: Lint docs (Markdown)
        run: markdownlint README.md "docs/**/*.md"

  validate-json-schema-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate JSON syntax for all schema files
        run: |
          find . -type f -name '*.schema.json' -print0 | while IFS= read -r -d '' file; do
            python -m json.tool "$file" >/dev/null
          done
