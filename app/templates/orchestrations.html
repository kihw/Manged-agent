<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orchestrations</title>
    <style>
      body { font-family: "Segoe UI", sans-serif; margin: 0; background: #f2efe8; color: #1f2933; }
      main { max-width: 1100px; margin: 0 auto; padding: 32px 20px 48px; }
      table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
      th, td { padding: 12px 14px; border-bottom: 1px solid #ece8e1; text-align: left; }
      a { color: #116466; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <p><a href="/dashboard">Back to dashboard</a></p>
      <h1>Orchestrations</h1>
      <table>
        <thead><tr><th>Orchestration</th><th>Version</th><th>Status</th><th>Entrypoint</th></tr></thead>
        <tbody>
          {% for orchestration in orchestrations %}
          <tr>
            <td>{{ orchestration.name }}</td>
            <td>{{ orchestration.version }}</td>
            <td>{{ orchestration.status }}</td>
            <td>{{ orchestration.entrypoint }}</td>
          </tr>
          {% else %}
          <tr><td colspan="4">No orchestrations yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </main>
  </body>
</html>
